version: '3.9'

services:
  postgres:
    image: ankane/pgvector
    container_name: culinary_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: culinary_compass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: culinary_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: culinary_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: culinary_meili
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey}
    ports:
      - '7700:7700'
    volumes:
      - meili_data:/meili_data

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: culinary_libretranslate
    ports:
      - '5000:5000'
    environment:
      LT_LOAD_ONLY: 'en,hi,es,fr,ar,pt,zh,ja,de,it'
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  meili_data:
